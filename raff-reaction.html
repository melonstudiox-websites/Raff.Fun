<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Guess The Raff Reaction — Raff.fun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--surface:#111;--border:#1e1e1e;--accent:#e01f1f;--accent2:#1a6aff;--text:#f0ede6;--muted:#555}
  *,*::before,*::after{box-sizing:border-box;margin:0}
  html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:.35}
  .back-btn{position:fixed;top:18px;left:18px;display:flex;align-items:center;gap:7px;padding:8px 16px;border:1px solid var(--border);border-radius:100px;color:var(--muted);text-decoration:none;font-size:13px;background:var(--surface);transition:all .15s;z-index:10}
  .back-btn:hover{color:var(--accent);border-color:var(--accent)}
  .game-wrap{width:100%;max-width:580px;padding:80px 24px 60px;display:flex;flex-direction:column;align-items:center;gap:28px;position:relative;z-index:1}
  .game-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,8vw,60px);letter-spacing:.04em;text-align:center;line-height:1.1}
  .game-title .r{color:var(--accent)}
  .game-subtitle{color:var(--muted);font-size:14px;letter-spacing:.1em;text-transform:uppercase;text-align:center}
  .progress-bar-wrap{width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s cubic-bezier(.16,1,.3,1)}
  .score-display{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .score-display span{color:var(--accent);font-weight:600}
  .scenario-card{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px 32px;text-align:center;position:relative;overflow:hidden;animation:pop-in .35s cubic-bezier(.16,1,.3,1) both}
  .scenario-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .q-label{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
  .scenario-text{font-size:clamp(18px,3.5vw,22px);font-weight:600;line-height:1.5;color:var(--text)}
  .emoji-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%}
  .emoji-btn{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:20px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .15s;position:relative}
  .emoji-btn:hover{border-color:#333;transform:translateY(-3px) scale(1.05);box-shadow:0 8px 24px rgba(0,0,0,.35)}
  .emoji-btn .em{font-size:36px;line-height:1}
  .emoji-btn .em-label{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
  .emoji-btn.correct{border-color:#1aff6a;background:rgba(26,255,106,.07)}
  .emoji-btn.wrong{border-color:var(--accent);background:rgba(224,31,31,.07)}
  .emoji-btn.disabled{pointer-events:none}
  .result-banner{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px 28px;text-align:center;display:none;flex-direction:column;gap:10px;align-items:center;animation:pop-in .3s cubic-bezier(.16,1,.3,1) both}
  .result-banner.visible{display:flex}
  .result-verdict{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.06em}
  .result-reason{font-size:15px;color:var(--muted);font-weight:300;line-height:1.5;max-width:400px}
  .next-btn{padding:12px 32px;background:var(--accent);color:#fff;border:none;border-radius:100px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.1em;cursor:pointer;transition:transform .1s;margin-top:4px}
  .next-btn:hover{transform:scale(1.05)}
  .final-screen{display:none;width:100%;flex-direction:column;align-items:center;gap:20px;text-align:center;animation:pop-in .5s cubic-bezier(.16,1,.3,1) both}
  .final-screen.visible{display:flex}
  .final-big{font-size:80px;animation:float 2.5s ease-in-out infinite}
  .final-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,8vw,64px);letter-spacing:.04em}
  .final-score{font-family:'Bebas Neue',sans-serif;font-size:clamp(60px,12vw,96px);color:var(--accent);line-height:1}
  .final-label{font-size:13px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
  .final-sub{font-size:16px;font-weight:300;color:var(--muted);max-width:340px;line-height:1.6}
  .replay-btn{padding:16px 44px;background:var(--accent);color:#fff;border:none;border-radius:100px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.1em;cursor:pointer;transition:transform .1s;margin-top:8px}
  .replay-btn:hover{transform:scale(1.05)}
  @keyframes pop-in{from{opacity:0;transform:scale(.94) translateY(10px)}to{opacity:1;transform:none}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
</style>
</head>
<body>
<a href="../index.html" class="back-btn">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  Raff.fun
</a>
<div class="game-wrap">
  <div class="game-title">Guess The <span class="r">Raff</span> Reaction</div>
  <div class="game-subtitle">What emoji would Raff send?</div>
  <div style="width:100%;display:flex;flex-direction:column;gap:10px;align-items:center">
    <div class="score-display">Score: <span id="score-val">0</span> / <span id="total-val">0</span></div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div id="main-ui" style="width:100%;display:flex;flex-direction:column;gap:20px;align-items:center">
    <div class="scenario-card">
      <div class="q-label" id="q-label">Scenario 1 of 10</div>
      <div class="scenario-text" id="scenario-text">Loading...</div>
    </div>
    <div class="emoji-grid" id="emoji-grid"></div>
    <div class="result-banner" id="result-banner">
      <div class="result-verdict" id="result-verdict"></div>
      <div class="result-reason" id="result-reason"></div>
      <button class="next-btn" onclick="nextQ()">Next →</button>
    </div>
  </div>
  <div class="final-screen" id="final-screen">
    <div class="final-big" id="final-emoji">🎉</div>
    <div class="final-title" id="final-title">Result</div>
    <div class="final-score" id="final-score">0/10</div>
    <div class="final-label">correct reactions</div>
    <div class="final-sub" id="final-sub"></div>
    <button class="replay-btn" onclick="startGame()">Play Again</button>
    <a href="../index.html" class="back-btn" style="position:relative;top:auto;left:auto;margin-top:4px">← More games</a>
  </div>
</div>
<script>
// ─── SCENARIOS ────────────────────────────────────────────────
// correct: the emoji Raff would actually send
// options: 4 emojis to show (include the correct one!)
// reason: explanation after answer
// CUSTOMIZE: edit scenarios and reactions to match your Raff!
const ALL_SCENARIOS = [
  {
    text: "Someone sends Raff a 3-minute voice message.",
    correct: "😐", options: ["😂","😐","❤️","👍"], correctLabel: "unbothered",
    reason: "Raff will not listen to that. He'll reply 'lol' and move on."
  },
  {
    text: "Raff finishes an entire pizza by himself.",
    correct: "😌", options: ["😌","😅","🤢","😎"], correctLabel: "at peace",
    reason: "Zero guilt. Pure satisfaction. This is a win."
  },
  {
    text: "Someone tells Raff a plan starts at 9am.",
    correct: "💀", options: ["💀","😊","👍","😤"], correctLabel: "dead",
    reason: "9am is not a time. It's a threat."
  },
  {
    text: "Raff accidentally sends a text to the wrong person.",
    correct: "😭", options: ["😭","😂","🙃","🫢"], correctLabel: "devastated",
    reason: "He spirals for 20 minutes minimum."
  },
  {
    text: "Someone spoils the ending of a show Raff is watching.",
    correct: "😤", options: ["😤","😂","🙂","😐"], correctLabel: "heated",
    reason: "He was on episode 3. He had 7 more to go."
  },
  {
    text: "Raff finds a perfect parking spot on the first try.",
    correct: "😎", options: ["😎","😌","🎉","😐"], correctLabel: "smooth",
    reason: "He takes it as a sign that today is his day."
  },
  {
    text: "It's 2am and Raff's stomach growls.",
    correct: "👀", options: ["👀","😴","😩","🤔"], correctLabel: "considering",
    reason: "The fridge raid is being evaluated. He'll do it."
  },
  {
    text: "Someone cancels plans last minute.",
    correct: "😌", options: ["😌","😤","😢","😮"], correctLabel: "relieved",
    reason: "He was going to cancel too. This is actually great news."
  },
  {
    text: "Raff discovers a show he started has 7 seasons.",
    correct: "😳", options: ["😳","😎","🎉","😩"], correctLabel: "daunted",
    reason: "He's committed now but this was not in the plan."
  },
  {
    text: "Someone asks Raff a question he definitely knows the answer to.",
    correct: "😏", options: ["😏","🤔","😅","👀"], correctLabel: "smug",
    reason: "He was waiting for this moment."
  },
  {
    text: "Raff wakes up and it's raining outside.",
    correct: "😴", options: ["😴","😤","🎉","😌"], correctLabel: "going back to sleep",
    reason: "Perfect excuse. He's logging off."
  },
  {
    text: "Someone says 'actually that's not how it works' to Raff.",
    correct: "🙂", options: ["🙂","😤","😂","😐"], correctLabel: "passive aggressive",
    reason: "That smile means he's not letting this go later."
  },
];

const ALL_EMOJIS = ["😂","😐","❤️","👍","😌","😅","🤢","😎","💀","😊","😤","😭","😂","🙃","🫢","😏","🤔","👀","😩","😮","😳","😢","🎉","🙂"];

let questions=[], current=0, score=0;
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function startGame(){
  questions=shuffle(ALL_SCENARIOS).slice(0,8);
  current=0;score=0;
  document.getElementById('final-screen').classList.remove('visible');
  document.getElementById('main-ui').style.display='flex';
  document.getElementById('result-banner').classList.remove('visible');
  renderQ();
}

function renderQ(){
  const q=questions[current];
  document.getElementById('q-label').textContent=`Scenario ${current+1} of ${questions.length}`;
  document.getElementById('scenario-text').textContent=q.text;
  document.getElementById('score-val').textContent=score;
  document.getElementById('total-val').textContent=current;
  document.getElementById('progress-fill').style.width=`${(current/questions.length)*100}%`;
  document.getElementById('result-banner').classList.remove('visible');
  const opts=shuffle(q.options);
  document.getElementById('emoji-grid').innerHTML=opts.map(em=>`
    <button class="emoji-btn" onclick="pick('${em}')">
      <div class="em">${em}</div>
      <div class="em-label">${em===q.correct?q.correctLabel:'?'}</div>
    </button>
  `).join('');
  // Hide labels until answered
  document.querySelectorAll('.em-label').forEach(el=>{if(el.textContent!=='?')el.style.display='none';else el.textContent='?';});
}

function pick(chosen){
  const q=questions[current];
  const correct=chosen===q.correct;
  if(correct)score++;
  document.querySelectorAll('.emoji-btn').forEach(btn=>{
    const em=btn.querySelector('.em').textContent;
    btn.classList.add('disabled');
    btn.querySelector('.em-label').style.display='block';
    btn.querySelector('.em-label').textContent=em===q.correct?q.correctLabel:'';
    if(em===q.correct)btn.classList.add('correct');
    if(em===chosen&&!correct)btn.classList.add('wrong');
  });
  const v=document.getElementById('result-verdict');
  v.textContent=correct?`✅ Correct! Raff sends ${q.correct}`:`❌ Raff sends ${q.correct}`;
  v.style.color=correct?'#1aff6a':'var(--accent)';
  document.getElementById('result-reason').textContent=q.reason;
  document.getElementById('result-banner').classList.add('visible');
}

function nextQ(){
  current++;
  if(current>=questions.length)showFinal();
  else renderQ();
}

function showFinal(){
  document.getElementById('main-ui').style.display='none';
  document.getElementById('final-screen').classList.add('visible');
  const pct=score/questions.length;
  document.getElementById('final-score').textContent=`${score}/${questions.length}`;
  let e,t,s;
  if(pct===1){e='🏆';t='You Read Raff Like A Book';s='Flawless. You know his emoji vocabulary perfectly.'}
  else if(pct>=0.75){e='🎯';t='Sharp Instincts!';s='You really get how Raff communicates.'}
  else if(pct>=0.5){e='😄';t='Decent Vibes';s='You know him okay. A few surprises.'}
  else{e='💀';t='Study Up';s='Raff is more complex than you thought.'}
  document.getElementById('final-emoji').textContent=e;
  document.getElementById('final-title').textContent=t;
  document.getElementById('final-sub').textContent=s;
}
startGame();
</script>
</body>
</html>

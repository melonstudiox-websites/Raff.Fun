<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Raff Runner — Raff.fun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--surface:#111;--border:#1e1e1e;--accent:#30cfd0;--accent2:#667eea;--text:#f0ede6;--muted:#666}
  *,*::before,*::after{box-sizing:border-box;margin:0}
  html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100%;overflow:hidden;-webkit-user-select:none;user-select:none;touch-action:manipulation}
  .back-btn{position:fixed;top:14px;left:14px;display:flex;align-items:center;gap:7px;padding:8px 16px;border:1px solid var(--border);border-radius:100px;color:var(--muted);text-decoration:none;font-size:13px;background:var(--surface);transition:all .15s;z-index:20}
  .back-btn:hover{color:var(--accent);border-color:var(--accent)}
  canvas{display:block;position:fixed;inset:0;width:100%;height:100%;z-index:1}
  .hud{position:fixed;top:54px;left:0;right:0;text-align:center;z-index:5;pointer-events:none}
  .title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.06em;color:var(--muted)}
  .title .r{color:var(--accent)}
  .score{font-family:'Bebas Neue',sans-serif;font-size:54px;line-height:1;color:#fff;text-shadow:0 3px 10px rgba(0,0,0,.6)}
  .overlay{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;background:rgba(5,5,5,.82);backdrop-filter:blur(3px);padding:24px}
  .overlay.show{display:flex}
  .overlay h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,11vw,76px);letter-spacing:.04em;line-height:1}
  .overlay p{color:var(--muted);font-size:16px;font-weight:300;max-width:330px;line-height:1.6}
  .big{font-family:'Bebas Neue',sans-serif;font-size:84px;color:var(--accent);line-height:1}
  .lbl{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .btn{padding:15px 46px;background:var(--accent);color:#062;font-weight:700;border:none;border-radius:100px;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.08em;cursor:pointer;transition:transform .1s}
  .btn:active{transform:scale(.95)}
  .hint{font-size:14px;color:var(--muted);letter-spacing:.08em}
</style>
</head>
<body>
<a href="../index.html" class="back-btn">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  Raff.fun
</a>
<canvas id="c"></canvas>
<div class="hud">
  <div class="title">Raff <span class="r">Runner</span></div>
  <div class="score" id="score">0</div>
</div>

<div class="overlay show" id="start">
  <h1>Raff <span style="color:var(--accent)">Runner</span></h1>
  <p>Raff is late. Extremely late. Help him sprint past everything in his way. Tap or press space to jump — double tap for a double jump!</p>
  <button class="btn" onclick="game.start()">Run!</button>
  <div class="hint">tap / click / space to jump</div>
</div>
<div class="overlay" id="over">
  <div class="lbl">Distance</div>
  <div class="big" id="finalScore">0</div>
  <h1 id="verdict">Tripped!</h1>
  <p id="blurb"></p>
  <button class="btn" onclick="game.start()">Run Again</button>
  <a href="../index.html" class="back-btn" style="position:relative;top:auto;left:auto;margin-top:4px">← More games</a>
</div>

<script>
const cvs=document.getElementById('c'), ctx=cvs.getContext('2d');
let W,H,DPR,groundY;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  cvs.width=W*DPR;cvs.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
  groundY=H*0.8;
}
window.addEventListener('resize',resize);resize();

const OBST=['⏰','🥦','🥕','📅','🛒','🥬'];
const game={
  running:false,score:0,best:+(localStorage.getItem('runner-best')||0),
  py:0,vy:0,onGround:true,jumps:0,speed:7,spawnX:0,obstacles:[],clouds:[],t:0,size:46,

  start(){
    document.getElementById('start').classList.remove('show');
    document.getElementById('over').classList.remove('show');
    this.running=true;this.score=0;this.py=0;this.vy=0;this.onGround=true;this.jumps=0;
    this.speed=7;this.obstacles=[];this.t=0;this.spawnX=W+200;
    this.clouds=[];for(let i=0;i<4;i++)this.clouds.push({x:Math.random()*W,y:60+Math.random()*120,s:0.3+Math.random()*0.5,e:Math.random()<.5?'☁️':'🌤️'});
    document.getElementById('score').textContent=0;
    if(!this._loop){this._loop=true;requestAnimationFrame(()=>this.tick());}
  },

  jump(){
    if(!this.running)return;
    if(this.onGround){this.vy=-15.5;this.onGround=false;this.jumps=1;}
    else if(this.jumps<2){this.vy=-13.5;this.jumps=2;}
  },

  tick(){
    requestAnimationFrame(()=>this.tick());
    if(this.running)this.update();
    this.draw();
  },

  update(){
    this.t++;
    this.score=Math.floor(this.t/4);
    document.getElementById('score').textContent=this.score;
    this.speed=Math.min(7+this.score*0.012,16);
    // physics
    this.vy+=0.78;this.py+=this.vy;
    if(this.py>=0){this.py=0;this.vy=0;this.onGround=true;this.jumps=0;}
    // spawn obstacles
    this.spawnX-=this.speed;
    if(this.spawnX<=0){
      const tall=Math.random()<0.3;
      const s=tall?64:46;
      this.obstacles.push({x:W+40,e:OBST[Math.floor(Math.random()*OBST.length)],s});
      const gap=260+Math.random()*220-Math.min(this.score*0.4,140);
      this.spawnX=Math.max(150,gap);
    }
    // move + collide
    const px=W*0.22, prW=42, prH=46;
    const ptop=groundY-prH+this.py;
    for(const o of this.obstacles)o.x-=this.speed;
    for(const c of this.clouds){c.x-=this.speed*c.s*0.4;if(c.x<-60){c.x=W+40;c.y=60+Math.random()*120;}}
    this.obstacles=this.obstacles.filter(o=>o.x>-80);
    for(const o of this.obstacles){
      const ow=o.s*0.62, oh=o.s*0.8;
      const ox=o.x-ow/2, otop=groundY-oh;
      if(px+prW*0.45 > ox && px-prW*0.05 < ox+ow && ptop+prH > otop+oh*0.12){
        this.end();return;
      }
    }
  },

  draw(){
    ctx.clearRect(0,0,W,H);
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0e2230');g.addColorStop(0.6,'#0a0a0a');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    // clouds
    ctx.font='40px serif';ctx.textBaseline='middle';ctx.globalAlpha=.5;
    for(const c of this.clouds){ctx.globalAlpha=.35;ctx.fillText(c.e,c.x,c.y);}
    ctx.globalAlpha=1;
    // ground
    ctx.strokeStyle=this.accentLine();ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(0,groundY+24);ctx.lineTo(W,groundY+24);ctx.stroke();
    ctx.fillStyle='#0d1418';ctx.fillRect(0,groundY+24,W,H-groundY);
    // dashed road marks
    ctx.strokeStyle='rgba(48,207,208,.25)';ctx.lineWidth=4;ctx.setLineDash([24,28]);
    ctx.lineDashOffset=-(this.t*this.speed)%52;
    ctx.beginPath();ctx.moveTo(0,groundY+60);ctx.lineTo(W,groundY+60);ctx.stroke();ctx.setLineDash([]);
    // obstacles
    ctx.textAlign='center';
    for(const o of this.obstacles){ctx.font=`${o.s}px serif`;ctx.fillText(o.e,o.x,groundY-o.s*0.4+4);}
    // player (bobbing run)
    const px=W*0.22;
    const bob=this.onGround?Math.sin(this.t*0.4)*3:0;
    ctx.font='46px serif';
    ctx.save();ctx.translate(px,groundY-23+this.py+bob);
    ctx.scale(-1,1); // face right
    ctx.fillText('🏃',0,0);ctx.restore();
    // shadow
    ctx.globalAlpha=Math.max(0,0.3-(-this.py)/600);ctx.fillStyle='#000';
    ctx.beginPath();ctx.ellipse(px,groundY+4,22,6,0,0,7);ctx.fill();ctx.globalAlpha=1;
  },
  accentLine(){return 'rgba(48,207,208,.5)';},

  end(){
    this.running=false;
    if(this.score>this.best){this.best=this.score;localStorage.setItem('runner-best',this.best);}
    document.getElementById('finalScore').textContent=this.score;
    let v,b;
    if(this.score>=600){v='Actually On Time?!';b='Unprecedented. Raff arrived before the meeting started. Frame this.';}
    else if(this.score>=350){v='Flying!';b='He vaulted over every obstacle life threw at him. Still 10 minutes late though.';}
    else if(this.score>=150){v='Good Sprint!';b='Solid running. Raff is sweating but making progress.';}
    else if(this.score>=50){v='Tripped!';b='A veggie got him. Raff blames the veggie. And the traffic.';}
    else {v='Already?';b='Out of the gate and straight into an alarm clock. Classic Raff start.';}
    document.getElementById('verdict').textContent=v;
    document.getElementById('blurb').textContent=`${b} (best: ${this.best})`;
    setTimeout(()=>document.getElementById('over').classList.add('show'),450);
  }
};
function press(e){
  if(e.type==='keydown'&&e.code!=='Space'&&e.code!=='ArrowUp')return;
  if(e.cancelable)e.preventDefault();
  game.jump();
}
window.addEventListener('pointerdown',press);
window.addEventListener('keydown',press);
document.querySelectorAll('.btn,.back-btn').forEach(el=>el.addEventListener('pointerdown',e=>e.stopPropagation()));
game.draw();
</script>
</body>
</html>

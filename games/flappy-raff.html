<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Flappy Raff — Raff.fun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--surface:#111;--border:#1e1e1e;--accent:#f7971e;--accent2:#ffd200;--text:#f0ede6;--muted:#666}
  *,*::before,*::after{box-sizing:border-box;margin:0}
  html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100%;overflow:hidden;-webkit-user-select:none;user-select:none;touch-action:manipulation}
  .back-btn{position:fixed;top:14px;left:14px;display:flex;align-items:center;gap:7px;padding:8px 16px;border:1px solid var(--border);border-radius:100px;color:var(--muted);text-decoration:none;font-size:13px;background:var(--surface);transition:all .15s;z-index:20}
  .back-btn:hover{color:var(--accent);border-color:var(--accent)}
  canvas{display:block;position:fixed;inset:0;width:100%;height:100%;z-index:1}
  .score{position:fixed;top:64px;left:0;right:0;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:72px;color:#fff;text-shadow:0 4px 14px rgba(0,0,0,.7);z-index:5;pointer-events:none}
  .overlay{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;background:rgba(5,5,5,.82);backdrop-filter:blur(3px);padding:24px}
  .overlay.show{display:flex}
  .overlay h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,11vw,76px);letter-spacing:.04em;line-height:1}
  .overlay p{color:var(--muted);font-size:16px;font-weight:300;max-width:330px;line-height:1.6}
  .big{font-family:'Bebas Neue',sans-serif;font-size:84px;color:var(--accent2);line-height:1}
  .lbl{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .btn{padding:15px 46px;background:var(--accent);color:#3a2400;font-weight:700;border:none;border-radius:100px;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.08em;cursor:pointer;transition:transform .1s}
  .btn:active{transform:scale(.95)}
  .hint{font-size:14px;color:var(--muted);letter-spacing:.08em}
</style>
</head>
<body>
<a href="../index.html" class="back-btn">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  Raff.fun
</a>
<canvas id="c"></canvas>
<div class="score" id="score"></div>

<div class="overlay show" id="start">
  <h1>Flappy <span style="color:var(--accent)">Raff</span></h1>
  <p>Raff overslept and missed the bus, so now he flies. Tap to flap and squeeze through the gaps. Don't hit the alarm towers.</p>
  <button class="btn" onclick="game.start()">Fly</button>
  <div class="hint">tap / click / space to flap</div>
</div>
<div class="overlay" id="over">
  <div class="lbl">Gaps cleared</div>
  <div class="big" id="finalScore">0</div>
  <h1 id="verdict">Splat!</h1>
  <p id="blurb"></p>
  <button class="btn" onclick="game.start()">Try Again</button>
  <a href="../index.html" class="back-btn" style="position:relative;top:auto;left:auto;margin-top:4px">← More games</a>
</div>

<script>
const cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
let W,H,DPR;
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cvs.width=W*DPR;cvs.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();

const game={
  running:false,score:0,best:+(localStorage.getItem('flappy-best')||0),
  y:0,vy:0,rot:0,pipes:[],t:0,gap:0,speed:0,pipeW:64,R:20,floorH:70,started:false,

  start(){
    document.getElementById('start').classList.remove('show');
    document.getElementById('over').classList.remove('show');
    this.running=true;this.started=false;this.score=0;this.y=H*0.42;this.vy=0;this.rot=0;
    this.pipes=[];this.t=0;this.speed=Math.max(3.4,W*0.006);this.gap=Math.max(160,H*0.27);
    document.getElementById('score').textContent='';
    if(!this._loop){this._loop=true;requestAnimationFrame(()=>this.tick());}
  },

  flap(){
    if(!this.running)return;
    this.started=true;
    this.vy=-Math.max(7.5,H*0.011);
  },

  addPipe(){
    const margin=70;
    const top=margin+Math.random()*(H-this.floorH-this.gap-margin*2);
    this.pipes.push({x:W+this.pipeW,top,passed:false});
  },

  tick(){requestAnimationFrame(()=>this.tick());if(this.running)this.update();this.draw();},

  update(){
    if(!this.started){this.y=H*0.42+Math.sin(this.t*0.08)*8;this.t++;return;}
    this.t++;
    this.vy+=Math.max(0.42,H*0.0006);this.y+=this.vy;
    this.rot=Math.max(-0.4,Math.min(1.1,this.vy*0.045));
    // spawn pipes by spacing
    const last=this.pipes[this.pipes.length-1];
    if(!last||last.x<W-(W*0.42)){this.addPipe();}
    const px=W*0.26;
    for(const p of this.pipes){
      p.x-=this.speed;
      if(!p.passed&&p.x+this.pipeW<px){p.passed=true;this.score++;document.getElementById('score').textContent=this.score;this.speed+=0.04;}
      // collision
      if(px+this.R>p.x && px-this.R<p.x+this.pipeW){
        if(this.y-this.R<p.top || this.y+this.R>p.top+this.gap){this.end();}
      }
    }
    this.pipes=this.pipes.filter(p=>p.x>-this.pipeW-10);
    if(this.y+this.R>H-this.floorH){this.y=H-this.floorH-this.R;this.end();}
    if(this.y-this.R<0){this.y=this.R;this.vy=0;}
  },

  draw(){
    ctx.clearRect(0,0,W,H);
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#2a1c05');g.addColorStop(.6,'#0a0a0a');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    // pipes (alarm towers)
    for(const p of this.pipes)this.pipe(p);
    // floor
    ctx.fillStyle='#1a1308';ctx.fillRect(0,H-this.floorH,W,this.floorH);
    ctx.strokeStyle='rgba(247,151,30,.6)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(0,H-this.floorH);ctx.lineTo(W,H-this.floorH);ctx.stroke();
    ctx.strokeStyle='rgba(247,151,30,.2)';ctx.lineWidth=4;ctx.setLineDash([20,24]);
    ctx.lineDashOffset=-(this.t*this.speed)%44;
    ctx.beginPath();ctx.moveTo(0,H-this.floorH/2);ctx.lineTo(W,H-this.floorH/2);ctx.stroke();ctx.setLineDash([]);
    // bird
    const px=W*0.26;
    ctx.save();ctx.translate(px,this.y);ctx.rotate(this.rot);
    ctx.font='42px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(this.started?'🐤':'😴',0,0);
    ctx.restore();
  },

  pipe(p){
    const w=this.pipeW;
    const grad=ctx.createLinearGradient(p.x,0,p.x+w,0);
    grad.addColorStop(0,'#c4690f');grad.addColorStop(.5,'#f7971e');grad.addColorStop(1,'#c4690f');
    ctx.fillStyle=grad;ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=2;
    // top
    ctx.fillRect(p.x,0,w,p.top);ctx.strokeRect(p.x,0,w,p.top);
    ctx.fillRect(p.x-6,p.top-22,w+12,22);ctx.strokeRect(p.x-6,p.top-22,w+12,22);
    // bottom
    const by=p.top+this.gap;
    ctx.fillRect(p.x,by,w,H-by-this.floorH);ctx.strokeRect(p.x,by,w,H-by-this.floorH);
    ctx.fillRect(p.x-6,by,w+12,22);ctx.strokeRect(p.x-6,by,w+12,22);
    // alarm emoji on caps
    ctx.font='22px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('⏰',p.x+w/2,p.top-11);ctx.fillText('⏰',p.x+w/2,by+11);
  },

  end(){
    this.running=false;
    if(this.score>this.best){this.best=this.score;localStorage.setItem('flappy-best',this.best);}
    document.getElementById('finalScore').textContent=this.score;
    let v,b;
    if(this.score>=30){v='Sky Raff!';b='A natural aviator. Birds are taking notes. The bus is irrelevant now.';}
    else if(this.score>=15){v='Soaring!';b='Smooth flying through the alarm towers. Impressive wingwork.';}
    else if(this.score>=6){v='Airborne!';b='You got some real air. Raff is basically a pilot now.';}
    else if(this.score>=1){v='Flap Flap';b='A gap or two cleared before gravity remembered its job.';}
    else {v='Splat!';b='Straight into the first alarm. Raff was not built for the sky.';}
    document.getElementById('verdict').textContent=v;
    document.getElementById('blurb').textContent=`${b} (best: ${this.best})`;
    setTimeout(()=>document.getElementById('over').classList.add('show'),450);
  }
};
function flap(e){
  if(e.type==='keydown'&&e.code!=='Space'&&e.code!=='ArrowUp')return;
  if(e.cancelable)e.preventDefault();
  game.flap();
}
addEventListener('pointerdown',flap);
addEventListener('keydown',flap);
document.querySelectorAll('.btn,.back-btn').forEach(el=>el.addEventListener('pointerdown',e=>e.stopPropagation()));
game.draw();
</script>
</body>
</html>

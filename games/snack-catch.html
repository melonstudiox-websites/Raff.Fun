<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Snack Catch — Raff.fun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--surface:#111;--border:#1e1e1e;--accent:#00c9ff;--accent2:#92fe9d;--text:#f0ede6;--muted:#666}
  *,*::before,*::after{box-sizing:border-box;margin:0}
  html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100%;overflow:hidden;-webkit-user-select:none;user-select:none;touch-action:none}
  .back-btn{position:fixed;top:14px;left:14px;display:flex;align-items:center;gap:7px;padding:8px 16px;border:1px solid var(--border);border-radius:100px;color:var(--muted);text-decoration:none;font-size:13px;background:var(--surface);transition:all .15s;z-index:20}
  .back-btn:hover{color:var(--accent);border-color:var(--accent)}
  canvas{display:block;position:fixed;inset:0;width:100%;height:100%;z-index:1}
  .hud{position:fixed;top:52px;left:0;right:0;display:flex;justify-content:center;gap:28px;z-index:5;pointer-events:none;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .hud b{color:var(--accent2);font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.04em}
  .hud .lives{color:#ff5c5c;font-size:20px}
  .overlay{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;background:rgba(5,5,5,.82);backdrop-filter:blur(3px);padding:24px}
  .overlay.show{display:flex}
  .overlay h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,11vw,76px);letter-spacing:.04em;line-height:1}
  .overlay p{color:var(--muted);font-size:16px;font-weight:300;max-width:330px;line-height:1.6}
  .big{font-family:'Bebas Neue',sans-serif;font-size:84px;color:var(--accent);line-height:1}
  .lbl{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .btn{padding:15px 46px;background:var(--accent);color:#013;font-weight:700;border:none;border-radius:100px;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.08em;cursor:pointer;transition:transform .1s}
  .btn:active{transform:scale(.95)}
  .hint{font-size:14px;color:var(--muted);letter-spacing:.08em}
</style>
</head>
<body>
<a href="../index.html" class="back-btn">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  Raff.fun
</a>
<canvas id="c"></canvas>
<div class="hud">
  <span>Score <b id="score">0</b></span>
  <span class="lives" id="lives">❤️❤️❤️</span>
</div>

<div class="overlay show" id="start">
  <h1>Snack <span style="color:var(--accent)">Catch</span></h1>
  <p>Snacks are raining from the sky and Raff is hungry. Slide the bowl to catch them! Dodge the veggies — Raff does not do veggies.</p>
  <button class="btn" onclick="game.start()">Start</button>
  <div class="hint">drag / move mouse / arrow keys</div>
</div>
<div class="overlay" id="over">
  <div class="lbl">Snacks caught</div>
  <div class="big" id="finalScore">0</div>
  <h1 id="verdict">Full!</h1>
  <p id="blurb"></p>
  <button class="btn" onclick="game.start()">Again</button>
  <a href="../index.html" class="back-btn" style="position:relative;top:auto;left:auto;margin-top:4px">← More games</a>
</div>

<script>
const cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
let W,H,DPR;
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cvs.width=W*DPR;cvs.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();

const SNACKS=['🍔','🍟','🍩','🍕','🍪','🧁','🍿','🌮','🍫','🥨','🍬','🍦'];
const VEG=['🥦','🥬','🥕','🫑'];
const game={
  running:false,score:0,lives:3,bx:0,items:[],t:0,spawn:0,target:null,

  start(){
    document.getElementById('start').classList.remove('show');
    document.getElementById('over').classList.remove('show');
    this.running=true;this.score=0;this.lives=3;this.bx=W/2;this.target=W/2;this.items=[];this.t=0;this.spawn=0;
    document.getElementById('score').textContent=0;
    document.getElementById('lives').textContent='❤️❤️❤️';
    if(!this._loop){this._loop=true;requestAnimationFrame(()=>this.tick());}
  },

  tick(){requestAnimationFrame(()=>this.tick());if(this.running)this.update();this.draw();},

  update(){
    this.t++;
    // bowl follows target
    this.bx+=(this.target-this.bx)*0.35;
    this.bx=Math.max(40,Math.min(W-40,this.bx));
    // spawn
    this.spawn--;
    if(this.spawn<=0){
      const veg=Math.random()<0.26;
      this.items.push({x:40+Math.random()*(W-80),y:-40,
        e:veg?VEG[Math.floor(Math.random()*VEG.length)]:SNACKS[Math.floor(Math.random()*SNACKS.length)],
        veg,vy:3+Math.random()*1.5+Math.min(this.score*0.04,4),rot:(Math.random()-.5)*0.1});
      this.spawn=Math.max(22,52-this.score*0.5);
    }
    const by=H*0.84;
    for(const it of this.items){
      it.y+=it.vy;
      if(!it.dead && it.y>by-34 && it.y<by+30 && Math.abs(it.x-this.bx)<46){
        it.dead=true;
        if(it.veg){this.hurt();}
        else{this.score++;document.getElementById('score').textContent=this.score;it.pop=1;}
      }
      if(!it.dead && it.y>H+40){ it.dead=true; }
    }
    this.items=this.items.filter(it=>!(it.dead&&!it.pop)||(it.pop&&it.pop<12));
    for(const it of this.items)if(it.pop)it.pop++;
  },

  hurt(){
    this.lives--;
    document.getElementById('lives').textContent='❤️'.repeat(Math.max(0,this.lives))+'🖤'.repeat(3-Math.max(0,this.lives));
    if(this.lives<=0)this.end();
  },

  draw(){
    ctx.clearRect(0,0,W,H);
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#06222b');g.addColorStop(.7,'#0a0a0a');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.textBaseline='middle';
    for(const it of this.items){
      ctx.save();ctx.translate(it.x,it.y);
      if(it.pop){const s=1+it.pop*0.12;ctx.globalAlpha=Math.max(0,1-it.pop/12);ctx.scale(s,s);}
      else ctx.rotate(Math.sin(this.t*0.05+it.x)*0.18);
      ctx.font='38px serif';ctx.fillText(it.e,0,0);ctx.restore();
    }
    // bowl
    const by=H*0.84;
    ctx.font='64px serif';ctx.globalAlpha=1;
    ctx.fillText('🥣',this.bx,by);
  },

  end(){
    this.running=false;
    document.getElementById('finalScore').textContent=this.score;
    let v,b;
    if(this.score>=60){v='Snack Legend!';b='Raff has never been more proud or more full. A historic haul.';}
    else if(this.score>=35){v='Stuffed!';b='Excellent catching. Raff loosens his belt in respect.';}
    else if(this.score>=15){v='Snackish';b='A decent grab. Raff is satisfied but eyeing the fridge.';}
    else {v='Veggie\'d!';b='A vegetable touched the bowl. Raff has called it a day.';}
    document.getElementById('verdict').textContent=v;
    document.getElementById('blurb').textContent=b;
    setTimeout(()=>document.getElementById('over').classList.add('show'),450);
  }
};
function move(e){const x=e.touches?e.touches[0].clientX:e.clientX;game.target=x;}
addEventListener('pointermove',move);
addEventListener('pointerdown',move);
addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'){game.target=Math.max(40,game.bx-60);}
  if(e.code==='ArrowRight'){game.target=Math.min(W-40,game.bx+60);}
});
document.querySelectorAll('.btn,.back-btn').forEach(el=>el.addEventListener('pointerdown',e=>e.stopPropagation()));
game.draw();
</script>
</body>
</html>

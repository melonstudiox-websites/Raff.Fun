<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bottle Flip — Raff.fun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{--accent:#43e97b;--accent2:#38f9d7;--muted:#888}
  *,*::before,*::after{box-sizing:border-box;margin:0}
  html,body{background:#0a0a0a;color:#f0ede6;font-family:'DM Sans',sans-serif;height:100%;overflow:hidden;-webkit-user-select:none;user-select:none;touch-action:none}
  .back-btn{position:fixed;top:14px;left:14px;display:flex;align-items:center;gap:7px;padding:8px 16px;border:1px solid rgba(255,255,255,.15);border-radius:100px;color:#fff;text-decoration:none;font-size:13px;background:rgba(0,0,0,.35);backdrop-filter:blur(6px);transition:all .15s;z-index:20}
  .back-btn:hover{color:var(--accent);border-color:var(--accent)}
  #c{display:block;position:fixed;inset:0;width:100%;height:100%;z-index:1}
  .hud{position:fixed;top:16px;left:0;right:0;display:flex;justify-content:center;gap:30px;z-index:5;pointer-events:none;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.7)}
  .hud b{color:var(--accent2);font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.04em}
  .hud .lives{color:#ff5c5c;font-size:20px}
  .overlay{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;background:rgba(5,10,7,.85);backdrop-filter:blur(4px);padding:24px}
  .overlay.show{display:flex}
  .overlay h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,11vw,76px);letter-spacing:.04em;line-height:1}
  .overlay p{color:#bbb;font-size:16px;font-weight:300;max-width:340px;line-height:1.6}
  .lbl{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .big{font-family:'Bebas Neue',sans-serif;font-size:80px;color:var(--accent2);line-height:1}
  .btn{padding:15px 46px;background:linear-gradient(135deg,var(--accent),#2bbf63);color:#042;font-weight:700;border:none;border-radius:100px;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.08em;cursor:pointer;transition:transform .1s;box-shadow:0 8px 20px rgba(67,233,123,.3)}
  .btn:active{transform:scale(.95)}
  .hint{font-size:14px;color:var(--muted);letter-spacing:.06em}
</style>
</head>
<body>
<a href="../index.html" class="back-btn">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  Raff.fun
</a>
<canvas id="c"></canvas>
<div class="hud">
  <span>Streak <b id="score">0</b></span>
  <span>Best <b id="best">0</b></span>
  <span class="lives" id="lives">❤️❤️❤️</span>
</div>

<div class="overlay show" id="start">
  <h1>Bottle <span style="color:var(--accent)">Flip</span></h1>
  <p>Raff's whole personality is landing this bottle flip. <b>Flick</b> the soda bottle to send it spinning and land it <b>standing up</b> on the table. Three faceplants and the bit is over.</p>
  <button class="btn" onclick="Game.start()">Flip</button>
  <div class="hint">flick up &amp; release · land it upright</div>
</div>
<div class="overlay" id="over">
  <div class="lbl">Best streak</div>
  <div class="big" id="finalScore">0</div>
  <h1 id="verdict">Faceplant!</h1>
  <p id="blurb"></p>
  <button class="btn" onclick="Game.start()">Again</button>
  <a href="../index.html" class="back-btn" style="position:relative;top:auto;left:auto;margin-top:4px">← More games</a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
const {Engine,Bodies,Body,Composite,Vector}=Matter;
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,DPR;
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;}
addEventListener('resize',resize);resize();
let best=+(localStorage.getItem('bottle-best')||0);document.getElementById('best').textContent=best;

const Game={
  start(){document.getElementById('start').classList.remove('show');document.getElementById('over').classList.remove('show');
    this.score=0;this.lives=3;document.getElementById('score').textContent=0;document.getElementById('lives').textContent='❤️❤️❤️';
    this.build();if(!this.loopOn){this.loopOn=true;requestAnimationFrame(()=>this.frame());}},

  build(){
    const engine=Engine.create();engine.gravity.y=1.1;this.engine=engine;
    this.particles=[];this.over=false;this.flying=false;this.dragging=false;this.judged=false;this.t=0;this.track=[];
    this.tableY=H*0.74;this.tableH=Math.max(60,H*0.16);
    Composite.add(engine.world,Bodies.rectangle(W/2,this.tableY+this.tableH/2+8,Math.min(W*0.8,520),this.tableH,{isStatic:true,friction:.9,restitution:.02}));
    this.spawnBottle();
  },

  spawnBottle(){
    if(this.bottle)Composite.remove(this.engine.world,this.bottle);
    const x=W*0.5,y=this.tableY-30;
    // bottom-weighted bottle = self-rights nicely
    const bottom=Bodies.rectangle(x,y+12,26,26,{density:.006,friction:.8,restitution:.05});
    const top=Bodies.rectangle(x,y-16,18,30,{density:.0006,friction:.6});
    const bottle=Body.create({parts:[bottom,top],friction:.8,frictionAir:.004,restitution:.06});
    this.bottle=bottle;Body.setStatic(bottle,true);Composite.add(this.engine.world,bottle);
    this.startY=y;this.flying=false;this.judged=false;this.settleT=0;
  },

  frame(){requestAnimationFrame(()=>this.frame());this.t++;
    if(this.engine&&!this.over){this.step();Engine.update(this.engine,1000/60);}this.draw();},

  step(){
    const b=this.bottle;if(!b)return;
    if(this.flying&&!this.judged){
      const v=Vector.magnitude(b.velocity)+Math.abs(b.angularVelocity)*10;
      if(v<0.5)this.settleT++;else this.settleT=0;
      if(this.settleT>18)this.judge();
      if(b.position.y>H+100)this.fail();
    }
    for(const p of this.particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;}this.particles=this.particles.filter(p=>p.life>0);
  },

  judge(){const b=this.bottle;let a=b.angle%(2*Math.PI);if(a>Math.PI)a-=2*Math.PI;if(a<-Math.PI)a+=2*Math.PI;
    const onTable=b.position.y<this.tableY+10;
    if(Math.abs(a)<0.32&&onTable)this.land();else this.fail();},

  land(){if(this.judged)return;this.judged=true;this.score++;document.getElementById('score').textContent=this.score;
    const b=this.bottle.position;for(let i=0;i<18;i++){const a=Math.random()*6.28,s=2+Math.random()*4;this.particles.push({x:b.x,y:b.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:30,r:3,c:'67,233,123'});}
    setTimeout(()=>{if(!this.over)this.spawnBottle();},600);},

  fail(){if(this.judged)return;this.judged=true;this.lives--;
    document.getElementById('lives').textContent='❤️'.repeat(Math.max(0,this.lives))+'🖤'.repeat(3-Math.max(0,this.lives));
    if(this.lives<=0){setTimeout(()=>this.end(),650);}else setTimeout(()=>{if(!this.over)this.spawnBottle();},700);},

  draw(){
    ctx.setTransform(DPR,0,0,DPR,0,0);
    const sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#0a2a1c');sky.addColorStop(.5,'#0e3326');sky.addColorStop(1,'#081a14');
    ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
    // table
    const tw=Math.min(W*0.8,520);
    const tg=ctx.createLinearGradient(0,this.tableY,0,this.tableY+this.tableH);tg.addColorStop(0,'#5a3a22');tg.addColorStop(1,'#2e1d12');
    ctx.fillStyle=tg;roundRect(W/2-tw/2,this.tableY,tw,this.tableH,8);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect(W/2-tw/2,this.tableY,tw,4);
    ctx.strokeStyle='rgba(67,233,123,.4)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W/2-tw/2,this.tableY);ctx.lineTo(W/2+tw/2,this.tableY);ctx.stroke();
    // bottle
    this.drawBottle();
    // particles
    for(const p of this.particles){ctx.fillStyle='rgba('+p.c+','+(p.life/30)+')';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.3);ctx.fill();}
    // flick guide
    if(this.dragging&&this.flick&&this.bottle){const t=this.bottle.position;ctx.strokeStyle='rgba(67,233,123,.9)';ctx.lineWidth=4;ctx.setLineDash([6,6]);
      ctx.beginPath();ctx.moveTo(t.x,t.y);ctx.lineTo(t.x+this.flick.x*0.4,t.y+this.flick.y*0.4);ctx.stroke();ctx.setLineDash([]);}
    if(!this.flying&&!this.dragging&&!this.over){ctx.fillStyle='rgba(56,249,215,'+(0.4+0.3*Math.sin(this.t*0.1))+')';ctx.font='14px DM Sans';ctx.textAlign='center';ctx.fillText('flick up ↑',W/2,this.startY-44);}
  },

  drawBottle(){const b=this.bottle;if(!b)return;ctx.save();ctx.translate(b.position.x,b.position.y);ctx.rotate(b.angle);
    // body
    const g=ctx.createLinearGradient(-13,0,13,0);g.addColorStop(0,'#1c8a4a');g.addColorStop(.5,'#43e97b');g.addColorStop(1,'#1c8a4a');
    ctx.fillStyle=g;roundRect(-13,-2,26,30,7);ctx.fill();
    // shoulder + neck
    ctx.beginPath();ctx.moveTo(-13,-2);ctx.lineTo(-7,-20);ctx.lineTo(7,-20);ctx.lineTo(13,-2);ctx.closePath();ctx.fill();
    ctx.fillStyle='#2bbf63';ctx.fillRect(-6,-30,12,12);
    // cap
    ctx.fillStyle='#eee';ctx.fillRect(-6,-34,12,5);
    // label
    ctx.fillStyle='rgba(255,255,255,.85)';roundRect(-11,4,22,14,3);ctx.fill();
    ctx.fillStyle='#1c8a4a';ctx.font='bold 9px DM Sans';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('RAFF',0,11);
    // shine
    ctx.fillStyle='rgba(255,255,255,.35)';roundRect(-10,-1,4,24,2);ctx.fill();
    ctx.restore();},

  begin(sx,sy){if(this.flying||this.over||!this.bottle)return;this.dragging=true;this.track=[{x:sx,y:sy,t:performance.now()}];this.flick=null;},
  move(sx,sy){if(!this.dragging)return;this.track.push({x:sx,y:sy,t:performance.now()});if(this.track.length>6)this.track.shift();
    const a=this.track[0],b=this.track[this.track.length-1];this.flick={x:b.x-a.x,y:b.y-a.y};},
  release(){if(!this.dragging)return;this.dragging=false;if(this.flying||!this.bottle)return;
    const tr=this.track;if(tr.length<2)return;const a=tr[0],b=tr[tr.length-1];const dt=Math.max(16,b.t-a.t);
    let vx=(b.x-a.x)/dt*16,vy=(b.y-a.y)/dt*16;const sp=Math.hypot(vx,vy);
    if(sp<4||vy>-2)return;const max=24;if(sp>max){vx*=max/sp;vy*=max/sp;}
    Body.setStatic(this.bottle,false);
    Body.setVelocity(this.bottle,{x:vx*0.4,y:Math.max(vy*0.7,-20)});
    // spin scales with flick speed -> the satisfying flip
    Body.setAngularVelocity(this.bottle,(0.30+Math.min(sp,24)*0.012)*(vx>=0?1:-1));
    this.flying=true;this.flick=null;},

  end(){if(this.over)return;this.over=true;if(this.score>best){best=this.score;localStorage.setItem('bottle-best',best);document.getElementById('best').textContent=best;}
    document.getElementById('finalScore').textContent=this.score;
    let v,b;
    if(this.score>=15){v='Flip God!';b='Bottle landed upright every time. Raff has peaked as a human being.';}
    else if(this.score>=8){v='Clean Hands!';b='An elite streak of stick-the-landing flips. Respect.';}
    else if(this.score>=3){v='Stuck It!';b='A few satisfying landings. Raff nods, deeply pleased.';}
    else{v='Faceplant!';b='The bottle refuses to stand. Raff blames the table, the floor, gravity.';}
    document.getElementById('verdict').textContent=v;document.getElementById('blurb').textContent=`${b} (best ${best})`;
    document.getElementById('over').classList.add('show');}
};
addEventListener('pointerdown',e=>Game.begin(e.clientX,e.clientY));
addEventListener('pointermove',e=>Game.move(e.clientX,e.clientY));
addEventListener('pointerup',e=>Game.release());
addEventListener('pointercancel',e=>Game.release());
document.querySelectorAll('.btn,.back-btn').forEach(el=>el.addEventListener('pointerdown',e=>e.stopPropagation()));
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
Game.draw();
</script>
</body>
</html>

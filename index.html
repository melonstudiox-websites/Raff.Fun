<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Raff.fun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0a;
    --surface:  #111111;
    --border:   #1e1e1e;
    --accent:   #e01f1f;
    --accent2:  #1a6aff;
    --text:     #f0ede6;
    --muted:    #555;
    --radius:   18px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── grain overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* ── blurry bg orbs ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(130px);
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 { width: 600px; height: 600px; background: var(--accent); top: -250px; left: -200px; opacity: 0.12; }
  .orb-2 { width: 500px; height: 500px; background: var(--accent2); bottom: -150px; right: -150px; opacity: 0.10; }
  .orb-3 { width: 300px; height: 300px; background: #8b0000; top: 40%; left: 50%; transform: translate(-50%,-50%); opacity: 0.07; }

  /* ── layout ── */
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 28px 80px;
  }

  /* ── header ── */
  header {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 72px 0 56px;
    position: relative;
  }

  .logo-lockup {
    display: flex;
    align-items: center;
    gap: 0;
    line-height: 1;
  }

  .logo-raff {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 14vw, 140px);
    color: var(--text);
    letter-spacing: 0.02em;
    line-height: 1;
    position: relative;
  }

  .logo-dot {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 14vw, 140px);
    color: var(--accent);
    line-height: 1;
  }

  .logo-fun {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 14vw, 140px);
    color: var(--accent2);
    line-height: 1;
    letter-spacing: 0.02em;
  }

  /* animated underline */
  .logo-raff::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 0;
    width: 100%;
    height: 4px;
    background: var(--accent);
    border-radius: 2px;
    transform: scaleX(0);
    transform-origin: left;
    animation: underline-in 0.6s cubic-bezier(.16,1,.3,1) 0.4s forwards;
  }

  @keyframes underline-in {
    to { transform: scaleX(1); }
  }

  .tagline {
    margin-top: 24px;
    font-size: 16px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .tagline em {
    color: var(--accent);
    font-style: normal;
    font-weight: 600;
  }

  /* ── empty state ── */
  .empty-state {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 80px 20px;
    text-align: center;
    color: var(--muted);
  }

  .empty-state.visible { display: flex; }

  .empty-state .big-emoji {
    font-size: 64px;
    filter: grayscale(0.3);
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .empty-state h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  .empty-state p {
    font-size: 15px;
    max-width: 360px;
    line-height: 1.6;
  }

  .code-hint {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    font-family: 'Courier New', monospace;
    color: var(--accent);
    margin-top: 8px;
  }

  /* ── grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }

  /* ── card ── */
  .card {
    position: relative;
    border-radius: var(--radius);
    aspect-ratio: 285 / 107;
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.12s cubic-bezier(.16,1,.3,1), box-shadow 0.12s ease;
    animation: card-in 0.5s cubic-bezier(.16,1,.3,1) both;
    border: 1px solid rgba(255,255,255,0.04);
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 1;
  }

  .card:hover {
    transform: translateY(-4px) scale(1.025);
    box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(224,31,31,0.2);
  }

  .card:hover::before { opacity: 1; }

  .card:active {
    transform: translateY(-1px) scale(1.01);
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .card-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    text-align: center;
    padding: 12px;
  }

  .card-emoji {
    font-size: 32px;
    line-height: 1;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.06em;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }

  .card-desc {
    font-size: 11px;
    font-weight: 300;
    color: rgba(255,255,255,0.75);
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    max-width: 200px;
    line-height: 1.4;
  }

  /* stagger delays */
  .card:nth-child(1)  { animation-delay: 0.05s; }
  .card:nth-child(2)  { animation-delay: 0.10s; }
  .card:nth-child(3)  { animation-delay: 0.15s; }
  .card:nth-child(4)  { animation-delay: 0.20s; }
  .card:nth-child(5)  { animation-delay: 0.25s; }
  .card:nth-child(6)  { animation-delay: 0.30s; }
  .card:nth-child(7)  { animation-delay: 0.35s; }
  .card:nth-child(8)  { animation-delay: 0.40s; }
  .card:nth-child(9)  { animation-delay: 0.45s; }
  .card:nth-child(10) { animation-delay: 0.50s; }
  .card:nth-child(11) { animation-delay: 0.55s; }
  .card:nth-child(12) { animation-delay: 0.60s; }

  /* ── footer ── */
  footer {
    margin-top: 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    position: relative;
    z-index: 1;
  }

  .footer-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .footer-name span { color: var(--accent); }

  .divider {
    width: 60px;
    height: 1px;
    background: var(--border);
  }

  .footer-links {
    display: flex;
    gap: 12px;
  }

  .footer-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 300;
    transition: all 0.15s;
    background: var(--surface);
  }

  .footer-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: scale(1.04);
  }

  /* ── ticker strip ── */
  .ticker-wrap {
    overflow: hidden;
    width: 100%;
    background: var(--accent);
    padding: 8px 0;
    margin: 48px 0;
    position: relative;
    z-index: 1;
  }

  .ticker-inner {
    display: flex;
    white-space: nowrap;
    animation: ticker 18s linear infinite;
  }

  .ticker-item {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 0.15em;
    color: #fff;
    padding: 0 32px;
  }

  .ticker-dot {
    color: var(--accent2);
  }

  @keyframes ticker {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* ── responsive ── */
  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr 1fr; gap: 14px; }
  }

  @media (max-width: 560px) {
    .grid { grid-template-columns: 1fr; gap: 10px; }
    header { padding: 48px 0 40px; }
    .ticker-wrap { margin: 32px 0; }
  }

  /* ── loading skeleton ── */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: var(--radius);
    aspect-ratio: 285/107;
  }

  @keyframes shimmer {
    from { background-position: 200% 0; }
    to   { background-position: -200% 0; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="wrap">

  <header>
    <div class="logo-lockup">
      <span class="logo-raff">Raff</span>
      <span class="logo-dot">.</span>
      <span class="logo-fun">fun</span>
    </div>
    <p class="tagline">games &amp; stuff about <em>Raff</em></p>
  </header>

</div>

<!-- ticker strip (full width, outside wrap) -->
<div class="ticker-wrap" id="ticker-wrap">
  <div class="ticker-inner" id="ticker-inner">
    <!-- filled by JS -->
  </div>
</div>

<div class="wrap">

  <!-- game grid -->
  <div class="grid" id="grid">
    <!-- skeletons while loading -->
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

  <!-- empty state (shown if no games) -->
  <div class="empty-state" id="empty-state">
    <div class="big-emoji">🎮</div>
    <h2>No games yet!</h2>
    <p>Drop a game HTML file in the <code>games/</code> folder, then add its entry to <code>games/manifest.json</code>.</p>
    <div class="code-hint">games/manifest.json</div>
  </div>

  <footer>
    <div class="divider"></div>
    <p class="footer-name">made for <span>Raff</span> ✦ raff.fun</p>
    <div class="footer-links">
      <a href="#" class="footer-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Support Raff
      </a>
      <a href="mailto:raff@raff.fun" class="footer-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
        Contact
      </a>
    </div>
  </footer>

</div>

<script>
const MANIFEST_PATH = 'games/manifest.json';

const PALETTE = [
  ['#e01f1f','#8b0000'],
  ['#1a6aff','#0a1a4a'],
  ['#cc0000','#1a6aff'],
  ['#8b0000','#2d0000'],
  ['#1a6aff','#003399'],
  ['#e01f1f','#660000'],
  ['#0044cc','#001166'],
  ['#cc2200','#1144cc'],
  ['#aa0000','#000033'],
  ['#1166ff','#550000'],
];

async function loadGames() {
  const grid = document.getElementById('grid');
  const emptyState = document.getElementById('empty-state');

  let games = [];

  try {
    const res = await fetch(MANIFEST_PATH + '?nocache=' + Date.now());
    if (!res.ok) throw new Error('No manifest');
    games = await res.json();
  } catch (e) {
    console.warn('Could not load manifest:', e);
  }

  grid.innerHTML = '';

  if (!games || games.length === 0) {
    emptyState.classList.add('visible');
    buildTicker([]);
    return;
  }

  games.forEach((game, i) => {
    const colors = game.color || PALETTE[i % PALETTE.length];
    const card = document.createElement('a');
    card.className = 'card';
    card.href = `games/${game.id}.html`;
    card.title = game.title;

    const gradAngle = 135;
    card.innerHTML = `
      <div class="card-bg" style="background: linear-gradient(${gradAngle}deg, ${colors[0]}, ${colors[1]});"></div>
      <div class="card-content">
        <div class="card-emoji">${game.emoji || '🎮'}</div>
        <div class="card-title">${escHtml(game.title)}</div>
        ${game.description ? `<div class="card-desc">${escHtml(game.description)}</div>` : ''}
      </div>
    `;

    grid.appendChild(card);
  });

  buildTicker(games);
}

function buildTicker(games) {
  const inner = document.getElementById('ticker-inner');

  const items = games.length > 0
    ? games.map(g => g.title)
    : ['Coming Soon', 'Games About Raff', 'Stay Tuned'];

  const sep = '<span class="ticker-dot"> ✦ </span>';
  const chunk = items.map(t => `<span class="ticker-item">${escHtml(t)}${sep}</span>`).join('');
  inner.innerHTML = chunk.repeat(6);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

loadGames();
</script>
</body>
</html>
